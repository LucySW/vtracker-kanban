<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VTracker Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container" id="app">
    <div class="logo">
      <h2>🎬 Workflow Hub</h2>
    </div>
    
    <div class="status-box">
      <div class="status-indicator active"></div>
      <span id="statusText">Listening for generations...</span>
    </div>
    <hr>

    <!-- SECTION: LOGIN -->
    <div id="loginSection">
      <h3>Faça Login</h3>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="passInput" placeholder="••••••••">
      </div>
      <button id="loginBtn" class="primary-btn">Entrar</button>
      <div id="loginError" class="auth-error hidden">Erro de login</div>
    </div>

    <!-- SECTION: WORKSPACE -->
    <div id="workspaceSection" class="hidden">
      <div class="user-info">
        Conectado na Vercel
        <a href="#" id="logoutBtn" style="float: right; color: #ff4d4f; text-decoration: none;">Sair</a>
      </div>
      <hr>

      <div class="form-group">
        <label for="projectSelect">Salvar vídeos no Projeto:</label>
        <select id="projectSelect" disabled>
          <option value="">Carregando...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="columnSelect">Na Coluna:</label>
        <select id="columnSelect" disabled>
          <option value="">Escolha um projeto</option>
        </select>
      </div>
      
      <button id="saveWorkspaceBtn" class="primary-btn">Definir Workspace</button>
      <div id="saveMsg" class="auth-success hidden">Salvo com sucesso!</div>
      <hr>
      <button id="openKanbanBtn" class="secondary-btn">Abrir Workflow Hub da Web</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
